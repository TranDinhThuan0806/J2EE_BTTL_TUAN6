<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Access Denied</title>
</head>
<body>
<div layout:fragment="content" class="container body-content" style="margin-top: 60px; text-align: center;">

    <div class="alert alert-danger" role="alert" style="max-width: 600px; margin: 0 auto; padding: 40px; border-radius: 12px;">
        <h1 style="font-size: 80px; margin: 0;">🚫</h1>
        <h2 class="mt-3">Access Denied</h2>
        <p class="mt-3 fs-5">
            Bạn không có quyền thực hiện hành động này.<br>
            Chức năng này chỉ dành cho <strong>Admin</strong>.
        </p>
        <hr>
        <a th:href="@{/products}" class="btn btn-primary mt-2">← Quay lại danh sách sản phẩm</a>
    </div>

</div>
</body>
</html>
